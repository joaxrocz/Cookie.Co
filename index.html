<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Soft Center | Joaquin Roco</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --brown: #4b2c20; --cream: #fffaf0; --accent: #d4a373; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--cream); color: var(--brown); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 450px; width: 100%; background: white; padding: 0; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Hero Image Section */
        .hero-img { width: 100%; height: 250px; background-image: url('https://joaxrocz.github.io/Cookie.Co/assets/hero-shot.png'); /* Ensure path is correct */ background-size: cover; background-position: center; border-bottom: 5px solid var(--accent); }
        
        .content { padding: 25px; text-align: center; }
        h1 { font-family: 'Pacifico', cursive; font-size: 2.2rem; margin: 10px 0; }
        .inventory { color: #c62828; font-weight: bold; font-size: 0.9rem; margin-bottom: 20px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.9rem; margin-left: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-top: 5px; }

        /* Invoice Overlay */
        #invoice { display: none; background: #fdfdfd; border: 2px solid var(--brown); padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; }
        .invoice-line { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }

        button { width: 100%; background: var(--brown); color: white; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        .gcash-box { background: #e3f2fd; padding: 15px; border-radius: 12px; font-size: 0.85rem; border: 1px solid #bbdefb; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="hero-img"></div>
    
    <div class="content">
        <h1>The Soft Center</h1>
        <p style="margin-top:-10px; opacity:0.8;">Freshly Baked by Joaquin Roco</p>
        <div class="inventory">🍪 Batch #1: Only 42 pieces available!</div>

        <div id="order-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Who's eating?">
            </div>
            <div class="form-group">
                <label>LBA Phase & Address</label>
                <input type="text" id="contact" placeholder="Phase 1-4 only">
            </div>
            <div class="form-group">
                <label>Quantity (₱35 per 40g cookie)</label>
                <input type="number" id="qty" value="1" min="1">
            </div>
            <button id="mainBtn" onclick="generateInvoice()">Review Order</button>
        </div>

        <div id="invoice">
            <h3 style="margin-top:0;">Order Summary</h3>
            <div class="invoice-line"><span>Product:</span> <strong>Premium Choco Chip</strong></div>
            <div class="invoice-line"><span>Size:</span> <strong>Palm Size (40g)</strong></div>
            <div class="invoice-line"><span>Qty:</span> <strong id="inv-qty">0</strong></div>
            <div class="invoice-line" style="border-bottom: 2px solid var(--brown);"><span>Total Amount:</span> <strong id="inv-total">₱0</strong></div>
            
            <div class="gcash-box">
                <strong>GCash for Payment:</strong><br>
                0917 815 6015 (Joaquin R.)
            </div>
            
            <button id="confirmBtn" onclick="finalizeOrder()">Confirm & Message Joaquin</button>
            <p style="font-size: 0.7rem; color: gray; margin-top: 10px;">Clicking confirm logs your order and opens Messenger.</p>
        </div>
    </div>
</div>

<script>
    emailjs.init("J2LADzhwnrBzCzIvd");

    function generateInvoice() {
        const name = document.getElementById('name').value;
        const contact = document.getElementById('contact').value;
        const qty = document.getElementById('qty').value;

        if(!name || !contact || qty < 1) {
            alert("Please fill in your details!");
            return;
        }

        document.getElementById('inv-qty').innerText = qty;
        document.getElementById('inv-total').innerText = "₱" + (qty * 35);
        
        document.getElementById('order-form').style.display = 'none';
        document.getElementById('invoice').style.display = 'block';
    }

    function finalizeOrder() {
        const name = document.getElementById('name').value;
        const contact = document.getElementById('contact').value;
        const qty = document.getElementById('qty').value;
        const total = qty * 35;
        const orderDetails = `${qty}x Premium Choco Chip (40g)`;

        const btn = document.getElementById('confirmBtn');
        btn.innerText = "Logging Order...";
        btn.disabled = true;

        const templateParams = {
            from_name: name,
            contact_info: contact,
            order_details: orderDetails,
            total_price: `₱${total}`
        };

        emailjs.send("service_oe4hwll", "template_n1n73yb", templateParams)
            .then(() => {
                const msg = `Hi Joaquin! Order Summary:\n\nName: ${name}\nOrder: ${orderDetails}\nTotal: ₱${total}\nAddress: ${contact}\n\nPayment via GCash.`;
                window.location.href = `https://m.me/joaxrocz?text=${encodeURIComponent(msg)}`;
            }, (err) => {
                alert("Opening Messenger...");
                window.location.href = `https://m.me/joaxrocz`;
            });
    }
</script>

</body>
</html>
