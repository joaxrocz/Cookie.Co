<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Soft Center | Freshly Baked by Joaquin Roco</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --brown-dark: #4b2c20;
            --brown-light: #8d6e63;
            --cream: #fffaf0;
            --accent: #d4a373;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--cream);
            color: var(--brown-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: var(--brown-dark);
        }

        .subtitle {
            font-style: italic;
            margin-bottom: 20px;
            color: var(--brown-light);
        }

        .inventory-badge {
            background: #fff5f5;
            color: #c62828;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            border: 1px solid #ffcdd2;
            display: inline-block;
            margin-bottom: 25px;
        }

        .product-card {
            border: 2px dashed var(--accent);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--brown-dark);
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .gcash-info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 15px;
            border: 1px solid #bbdefb;
        }

        button {
            width: 100%;
            background-color: var(--brown-dark);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #3e241a;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Soft Center</h1>
        <div class="subtitle">Freshly Baked by Joaquin Roco</div>

        <div class="inventory-badge">
            🔥 Limited Batch: 42 pieces only!
        </div>

        <div class="product-card">
            <strong>Premium Choco Chip</strong><br>
            <small>Palm Size (40g) • Crisp Edges • Gooey Center</small><br>
            <span class="price">₱35.00</span>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Address / Phase (LBA 1-4)</label>
            <input type="text" id="contact" placeholder="e.g. Phase 2, Block 1, Lot 2">
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="quantity" value="1" min="1">
        </div>

        <div class="gcash-info">
            <strong>Payment via GCash:</strong><br>
            0917 815 6015 (Joaquin R.)
        </div>

        <button id="orderBtn" onclick="confirmOrder()">Confirm & Message on FB</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SERVICE_ID = "service_oe4hwll";
        const TEMPLATE_ID = "template_n1n73yb";
        const PUBLIC_KEY = "J2LADzhwnrBzCzIvd";
        const PRICE_PER_PIECE = 35;
        const MESSENGER_LINK = "https://m.me/joaxrocz";

        // Initialize EmailJS
        (function() {
            emailjs.init(PUBLIC_KEY);
        })();

        function confirmOrder() {
            const name = document.getElementById('name').value;
            const contact = document.getElementById('contact').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const total = quantity * PRICE_PER_PIECE;

            if (!name || !contact || !quantity || quantity < 1) {
                alert("Please fill in all details!");
                return;
            }

            const orderDetails = `${quantity}x Premium Choco Chip (40g)`;
            const btn = document.getElementById('orderBtn');

            // UI Feedback
            btn.innerText = "Sending Order...";
            btn.disabled = true;

            // 1. Send Backup Email (Feeds Google Sheet via Zapier)
            const templateParams = {
                from_name: name,
                contact_info: contact,
                order_details: orderDetails,
                total_price: `₱${total}`,
                message: `New Order: ${orderDetails} | Total: ₱${total}`
            };

            emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams)
                .then(function() {
                    console.log('Order Logged Successfully');
                    
                    // 2. Redirect to Messenger
                    const msg = `Hi Joaquin! I'd like to order:\n\nName: ${name}\nOrder: ${orderDetails}\nTotal: ₱${total}\nAddress: ${contact}`;
                    window.location.href = `${MESSENGER_LINK}?text=${encodeURIComponent(msg)}`;
                    
                }, function(error) {
                    console.error('Error:', error);
                    alert("Sending to Messenger...");
                    window.location.href = MESSENGER_LINK;
                });
        }
    </script>
</body>
</html>
